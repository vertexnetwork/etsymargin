name: Lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

# Builds the app in-job and runs LHCI against localhost — no dependency
# on the Vercel preview deployment. Why: Vercel's Deployment Protection
# (enabled by default on private/team accounts) returns 401 to
# anonymous CI runners hitting the preview URL, which
# `wait-for-vercel-preview` can't bypass without threading a per-project
# automation-bypass token through. Building locally sidesteps the auth
# layer entirely and matches the pattern in sibling spokes (tokenmath).
#
# Trade-off: CI re-builds the same code Vercel already built, ~60s of
# extra runtime. Worth it to keep Lighthouse decoupled from Vercel
# domain protection state.

jobs:
  lighthouse:
    name: Lighthouse mobile budgets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run Lighthouse CI
        run: pnpm lhci
