name: CI

on:
  pull_request:
  push:
    branches: [main]

# Single status check exposed as `Lint · Typecheck · Test · Build` so
# the branch protection rule reads like a punch list of what the gate
# actually verifies. Steps are ordered cheapest-to-most-expensive so a
# styling slip fails in ~20s instead of after a full Next build.
#
# Branch protection rule note: when this rename lands, the existing
# `CI` required check in Settings → Branches becomes stale. Update it
# to require `Lint · Typecheck · Test · Build` instead.

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        # No `version:` — pnpm/action-setup reads from package.json's
        # `packageManager` field (single source of truth). Specifying
        # both causes the action to error with conflicting versions.

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier --check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (also exercises prebuild → changelog + favicons + OG)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
