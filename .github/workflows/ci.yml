name: CI

on:
  pull_request:
  push:
    branches: [main]

# Single status check named `CI` — bundles lint, typecheck, test, build
# so the branch protection rule needs exactly two gates: `CI` and
# `Lighthouse` (plus Vercel's auto-attached deployment check).
#
# Steps are ordered cheapest-to-most-expensive so a styling slip fails
# in ~20s instead of after a full Next build.

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier --check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (also exercises prebuild → changelog + favicons + OG)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
