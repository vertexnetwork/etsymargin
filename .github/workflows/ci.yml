name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single status check exposed as `Lint · Typecheck · Test · Build` so
# the branch protection rule reads like a punch list of what the gate
# actually verifies. Steps are ordered cheapest-to-most-expensive so a
# styling slip fails in ~20s instead of after a full Next build.

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so scripts/build-changelog.mjs can read git log.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (also exercises prebuild → changelog + favicons + OG)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
