name: Sync from vertex-network-hub

on:
  schedule:
    # Bi-weekly fallback (1st & 15th, 06:00 UTC ≈ every other week). The hub's
    # real-time `repository_dispatch` fan-out was removed here on purpose: with
    # a per-run branch name it spawned one PR per fire and slammed every spoke.
    # network.json / ai-bots.json rarely need same-day propagation; use the
    # manual trigger below for the occasional urgent change.
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pull network-wide files from hub
        env:
          HUB_RAW: https://raw.githubusercontent.com/ThatMovieGuyOriginal/vertex-network-hub/main
        run: |
          set -euo pipefail
          mkdir -p public
          curl -fsSL "$HUB_RAW/config/network.json" -o public/network.json
          curl -fsSL "$HUB_RAW/config/ai-bots.json" -o public/ai-bots.json
          # Optional: ads.txt / app-ads.txt / humans.txt are synced when the
          # hub publishes network-wide values. This site ships its own
          # "no display ads" copy from app/ads.txt/route.ts and
          # app/app-ads.txt/route.ts, so we deliberately do not pull those.

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # STABLE branch name: peter-evans/create-pull-request force-updates
          # this one long-lived branch and reuses its open PR. The previous
          # `hub-sync/${{ github.run_id }}` was unique per run, so every sync
          # opened a fresh branch+PR — the cause of the hub-sync sprawl.
          branch: hub-sync/network-registry
          commit-message: "chore(sync): pull latest network.json + ai-bots.json from hub"
          title: "chore(sync): vertex-hub network registry update"
          body: |
            Automated sync from
            [vertex-network-hub](https://github.com/ThatMovieGuyOriginal/vertex-network-hub).

            Diff between this branch and `main` is the new hub state.
          labels: hub-sync
          add-paths: |
            public/network.json
            public/ai-bots.json
